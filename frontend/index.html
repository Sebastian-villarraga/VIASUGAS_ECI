<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Viasugas</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/login.css">
</head>

<body class="login-body">

  <!-- Fondo -->
  <div class="background"></div>

  <!-- Contenedor -->
  <div class="main-container">

    <!-- Card -->
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-container">
        <img 
          src="/assets/images/Fondo-Blanco.png" 
          alt="Logo Viasugas"
          class="logo-viasugas"
        >
      </div>

      <!-- Formulario -->
      <form id="loginForm">

        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="Correo Electrónico" required>

        <label for="password">Contraseña</label>

        <div class="password-container">
          <input type="password" id="password" placeholder="********" required>

          <img 
            src="/assets/images/ojo.png" 
            class="eye-icon"
            onclick="togglePass('password', this)"
          >
        </div>

        <div class="forgot">
          <a href="javascript:void(0)">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit">Ingresar</button>

      </form>

    </div>

  </div>

  <!-- ========================= -->
  <!-- 🔥 MODAL CAMBIO PASSWORD -->
  <!-- ========================= -->
  <div id="modal-password" class="modal hidden" style="z-index: 999999;">
    <div class="modal-content">
  
      <h3>Cambiar contraseña</h3>
      <p>Debes cambiar tu contraseña para continuar</p>
  
      <div class="input-group">
        <input type="password" id="new-password" placeholder="Nueva contraseña">
        <img 
          src="/assets/images/ojo.png" 
          class="eye-icon"
          onclick="togglePass('new-password', this)"
        >
      </div>
      
      <div class="input-group">
        <input type="password" id="confirm-password" placeholder="Confirmar contraseña">
        <img 
          src="/assets/images/ojo.png" 
          class="eye-icon"
          onclick="togglePass('confirm-password', this)"
        >
      </div>
  
      <button type="button" onclick="guardarNuevaPassword()">
        Guardar
      </button>
  
    </div>
  </div>

  <!-- JS -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script> 
  <script src="/js/auth.js"></script>

  <!-- INIT -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof checkAuth === "function") checkAuth();
      if (typeof initLogin === "function") initLogin();
    });
  </script>

</body>
</html>
