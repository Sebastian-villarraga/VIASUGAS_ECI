<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Login - Viasugas</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- Fondo -->
  <div class="background"></div>

  <!-- Contenedor principal -->
  <div class="container">

    <!-- Lado izquierdo -->
    <div class="left"></div>

    <!-- Lado derecho -->
    <div class="right">

      <!-- Logo -->
      <div class="logo-container">
        <img src="./views/Fondo-Azul.jpg" alt="Logo Viasugas">
      </div>

      <!-- Formulario -->
      <div class="login-box">

        <h2>Acceso a Viasugas</h2>

        <form id="loginForm">

          <label>Correo Electrónico</label>
          <input type="email" id="email" placeholder="Correo Electrónico" required>

          <label>Contraseña</label>

          <div class="password-container">
            <input type="password" id="password" placeholder="********" required>

            <!-- ICONO OJO -->
            <img src="./views/ojo.png" id="togglePassword" class="eye-icon" alt="Ver contraseña">
          </div>

          <div class="forgot">
            <a href="./views/forgot.html">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit">Ingresar</button>

        </form>

      </div>

    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
