<div class="banco-layout">

  <div class="banco-left">

    <!-- HEADER -->
    <div class="banco-header">
      <h2>Bancos</h2>

      <button class="btn-secundario" onclick="abrirModalBanco()">
        <i class="fas fa-plus"></i> Agregar banco
      </button>
    </div>

    <!-- FILTROS -->
    <div class="banco-filtros">
      <div class="filtros-row">
    
        <div class="filtro-group">
          <label>Banco</label>
          <input type="text" id="filtroBanco" placeholder="Nombre del banco">
        </div>
    
        <div class="filtro-group">
          <label>Num Cuenta</label>
          <input type="text" id="filtroCuenta" placeholder="Número de cuenta">
        </div>
    
        <button class="btn-limpiar" onclick="limpiarFiltrosBanco()">
          Limpiar
        </button>
    
      </div>
    </div>

    <!-- TABLA -->
    <div class="banco-tabla">
      <div class="tabla-body">

        <table class="banco-table">
          <thead>
            <tr>
              <th>Banco</th>
              <th>Num Cuenta</th>
              <th>Tipo</th>
              <th>Titular</th>
              <th>Identificación</th>
              <th style="width: 80px;">Acciones</th>
            </tr>
          </thead>

          <tbody id="bancosTable">
            <tr>
              <td colspan="6">Cargando bancos...</td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modalBanco" class="modal hidden">

  <div class="modal-content">

    <h3>Agregar Banco</h3>

    <form id="formBanco" class="form-grid">

      <div class="form-group">
        <label>Nombre del Banco</label>
        <input type="text" id="nombre_banco" required>
      </div>

      <div class="form-group">
        <label>Número de Cuenta</label>
        <input type="text" id="numero_cuenta" required>
      </div>

      <div class="form-group">
        <label>Tipo de Cuenta</label>
        <select id="tipo_cuenta" required>
          <option value="">Seleccione</option>
          <option value="ahorros">Ahorros</option>
          <option value="corriente">Corriente</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nombre Titular</label>
        <input type="text" id="nombre_titular">
      </div>

      <div class="form-group">
        <label>Identificación</label>
        <input type="text" id="identificacion">
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="cerrarModalBanco()">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar</button>
      </div>

    </form>

  </div>

</div>
