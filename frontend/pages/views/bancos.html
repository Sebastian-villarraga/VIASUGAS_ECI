<div class="bnx-layout">

  <section class="bnx-main">

    <!-- HEADER -->
    <div class="bnx-header">

      <h2>Bancos</h2>

      <button
        class="bnx-btn bnx-btn-primary"
        onclick="abrirModalBanco()"
      >
        <i class="fas fa-plus"></i>
        Agregar banco
      </button>

    </div>

    <!-- FILTROS -->
    <div class="bnx-filters-box">

      <div class="bnx-filters-grid">

        <div class="bnx-field">
          <label>Banco</label>
          <input
            type="text"
            id="filtroBanco"
            placeholder="Nombre del banco"
          >
        </div>

        <div class="bnx-field">
          <label>Num Cuenta</label>
          <input
            type="text"
            id="filtroCuenta"
            placeholder="Número de cuenta"
          >
        </div>

        <div class="bnx-filter-action">
          <button
            class="bnx-btn bnx-btn-danger"
            onclick="limpiarFiltrosBanco()"
          >
            Limpiar
          </button>
        </div>

      </div>

    </div>

    <!-- TABLA -->
    <div class="bnx-table-card">

      <div class="bnx-table-scroll">

        <table class="bnx-table">

          <thead>
            <tr>
              <th>Banco</th>
              <th>Num Cuenta</th>
              <th>Tipo</th>
              <th>Titular</th>
              <th>Identificación</th>
              <th style="width:80px;">Acciones</th>
            </tr>
          </thead>

          <tbody id="bancosTable">
            <tr>
              <td colspan="6">Cargando bancos...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

</div>

<!-- MODAL -->
<div id="modalBanco" class="bnx-modal hidden">

  <div class="bnx-modal-box">

    <h3>Agregar Banco</h3>

    <form id="formBanco" class="bnx-form-grid">

      <div class="bnx-field">
        <label>Nombre del Banco</label>
        <select id="nombre_banco"></select>
      </div>

      <div class="bnx-field">
        <label>Número de Cuenta</label>
        <input type="text" id="numero_cuenta" required>
      </div>

      <div class="bnx-field">
        <label>Tipo de Cuenta</label>
        <select id="tipo_cuenta" required>
          <option value="">Seleccione</option>
          <option value="ahorros">Ahorros</option>
          <option value="corriente">Corriente</option>
        </select>
      </div>

      <div class="bnx-field">
        <label>Nombre Titular</label>
        <input type="text" id="nombre_titular">
      </div>

      <div class="bnx-field bnx-full">
        <label>Identificación</label>
        <input type="text" id="identificacion">
      </div>

      <div class="bnx-modal-actions">
        <button
          type="submit"
          class="bnx-btn bnx-btn-primary"
        >
          Guardar
        </button>
      </div>

    </form>

  </div>

</div>
