<div class="dashboard-layout">

  <!-- ========================= -->
  <!-- HEADER -->
  <!-- ========================= -->
  <div class="dashboard-header">
    <h2>Dashboard Gerencial</h2>
  </div>

  <!-- ========================= -->
  <!-- GRID PRINCIPAL ?? -->
  <!-- ========================= -->
  <div class="dashboard-main">

    <!-- ========================= -->
    <!-- IZQUIERDA -->
    <!-- ========================= -->
    <div class="dashboard-left">
    
      <!-- FILTROS -->
      <div class="dashboard-filtros">

        <div class="filtros-row">
      
          <!-- FECHA DESDE -->
          <div class="form-group">
            <label>Fecha desde</label>
            <input type="date" id="fDesdeDashboard">
          </div>
      
          <!-- FECHA HASTA -->
          <div class="form-group">
            <label>Fecha hasta</label>
            <input type="date" id="fHastaDashboard">
          </div>
      
          <!-- BOTONES -->
          <div class="filtros-actions">
            <button id="btnMesActual" class="btn-chip">Este mes</button>
            <button id="btnMesAnterior" class="btn-chip active">Mes anterior</button>
            <button id="btnLimpiarDashboard" class="btn-chip danger">Limpiar</button>
          </div>
      
        </div>
      
      </div>

      <!-- CARDS KPI -->
      <div id="cardsDashboard" class="dashboard-cards">
        <!-- Se renderiza con JS -->
      </div>
      

      <!-- TABLA RENTABILIDAD -->
      <div class="dashboard-table">

        <div class="table-header">
          <h3>Rentabilidad por Manifiesto</h3>
        </div>

        <table>
          <thead>
            <tr>
              <th>Manifiesto</th>
              <th>Cliente</th>
              <th class="text-center">Ingreso</th>
              <th class="text-center">Egreso</th>
              <th class="text-center">Utilidad</th>
              <th class="text-center">Margen %</th>
            </tr>
          </thead>

          <tbody id="tablaRentabilidad">
            <!-- Se llena dinámicamente -->
          </tbody>
        </table>

      </div>
      
      <div class="dashboard-table">

        <div class="table-header">
          <h3>Estado de Facturación</h3>
        </div>
      
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th class="text-center">Total Facturado</th>
              <th class="text-center">Pagado</th>
              <th class="text-center">Pendiente</th>
            </tr>
          </thead>
      
          <tbody id="tablaEstadoFacturacion">
            <!-- dinámico -->
          </tbody>
        </table>
      
      </div>

    </div>

    <!-- ========================= -->
    <!-- DERECHA -->
    <!-- ========================= -->
    <div class="dashboard-right">

      <!-- GRAFICA -->
      <div class="dashboard-chart">
        <h3>Ingresos vs Egresos</h3>
        <canvas id="graficaIE"></canvas>
      </div>
      
      <div class="dashboard-chart">
        <h3>Gastos por Categoría</h3>
      
        <div class="chart-container">
          <canvas id="graficaCategorias"></canvas>
        </div>
      </div>
      
      <div class="dashboard-chart">
        <h3>Top Clientes por Facturación</h3>
        <canvas id="graficaTopClientes"></canvas>
      </div>

    </div>

  </div>

</div>
