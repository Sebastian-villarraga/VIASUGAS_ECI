<div class="dbx-layout">

  <!-- HEADER -->
  <div class="dbx-header">
    <h2>Dashboard Gerencial</h2>
  </div>

  <!-- GRID PRINCIPAL -->
  <div class="dbx-main">

    <!-- IZQUIERDA -->
    <section class="dbx-left">

      <!-- FILTROS -->
      <div class="dbx-filters-box">

        <div class="dbx-filters-grid">

          <div class="dbx-group">
            <label>Fecha desde</label>
            <input type="date" id="fDesdeDashboard">
          </div>

          <div class="dbx-group">
            <label>Fecha hasta</label>
            <input type="date" id="fHastaDashboard">
          </div>

          <div class="dbx-actions">
            <button id="btnMesActual" class="dbx-btn dbx-btn-light">
              Este mes
            </button>

            <button id="btnMesAnterior" class="dbx-btn dbx-btn-primary">
              Mes anterior
            </button>

            <button id="btnLimpiarDashboard" class="dbx-btn dbx-btn-danger">
              Limpiar
            </button>
          </div>

        </div>

      </div>

      <!-- CARDS KPI -->
      <div id="cardsDashboard" class="dbx-cards">
        <!-- Se renderiza con JS -->
      </div>

      <!-- TABLA RENTABILIDAD -->
      <div class="dbx-table-card">

        <div class="dbx-table-header">
          <h3>Rentabilidad por Manifiesto</h3>
        </div>

        <div class="dbx-table-scroll">
          <table class="dbx-table">

            <thead>
              <tr>
                <th>Manifiesto</th>
                <th>Cliente</th>
                <th class="dbx-text-center">Ingreso</th>
                <th class="dbx-text-center">Egreso</th>
                <th class="dbx-text-center">Utilidad</th>
                <th class="dbx-text-center">Margen %</th>
              </tr>
            </thead>

            <tbody id="tablaRentabilidad">
              <!-- dinámico -->
            </tbody>

          </table>
        </div>

      </div>

      <!-- TABLA FACTURACION -->
      <div class="dbx-table-card">

        <div class="dbx-table-header">
          <h3>Estado de Facturación</h3>
        </div>

        <div class="dbx-table-scroll">
          <table class="dbx-table">

            <thead>
              <tr>
                <th>Cliente</th>
                <th class="dbx-text-center">Total Facturado</th>
                <th class="dbx-text-center">Pagado</th>
                <th class="dbx-text-center">Pendiente</th>
              </tr>
            </thead>

            <tbody id="tablaEstadoFacturacion">
              <!-- dinámico -->
            </tbody>

          </table>
        </div>

      </div>

    </section>

    <!-- DERECHA -->
    <aside class="dbx-right">

      <div class="dbx-chart-card">
        <h3>Ingresos vs Egresos</h3>
        <div class="dbx-chart-wrap">
          <canvas id="graficaIE"></canvas>
        </div>
      </div>

      <div class="dbx-chart-card">
        <h3>Gastos por Categoría</h3>
        <div class="dbx-chart-wrap">
          <canvas id="graficaCategorias"></canvas>
        </div>
      </div>

      <div class="dbx-chart-card">
        <h3>Top Clientes por Facturación</h3>
        <div class="dbx-chart-wrap">
          <canvas id="graficaTopClientes"></canvas>
        </div>
      </div>

    </aside>

  </div>

</div>
