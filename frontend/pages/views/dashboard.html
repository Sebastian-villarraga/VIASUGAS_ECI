<div class="dbx-layout">

  <div class="dbx-header">
    <h2>Dashboard Gerencial</h2>
  </div>

  <!-- FILTROS FULL WIDTH -->
  <div class="dbx-filters-box dbx-full">
  
    <!-- FILA 1 -->
    <div class="dbx-toolbar">
  
      <button id="btnMesAnterior" class="dbx-btn dbx-btn-light">Mes anterior</button>
      <button id="btnMesActual" class="dbx-btn dbx-btn-primary">Este mes</button>
      <button id="btnMesSiguiente" class="dbx-btn dbx-btn-light">Mes siguiente</button>
  
      <select id="filtroAnio" class="dbx-select"></select>
  
      <button class="dbx-btn dbx-btn-light" id="btnQ1">1er Q</button>
      <button class="dbx-btn dbx-btn-light" id="btnQ2">2do Q</button>
      <button class="dbx-btn dbx-btn-light" id="btnQ3">3er Q</button>
      <button class="dbx-btn dbx-btn-light" id="btnQ4">4to Q</button>
  
      <button class="dbx-btn dbx-btn-light" id="btnS1">1er Sem</button>
      <button class="dbx-btn dbx-btn-light" id="btnS2">2do Sem</button>
      <button class="dbx-btn dbx-btn-light" id="btnAnioCompleto">Ańo completo</button>
  
    </div>
  
    <!-- FILA 2 FIJA -->
    <div class="dbx-toolbar-bottom">
  
      <div class="dbx-group">
        <label>Fecha desde</label>
        <input type="date" id="fDesdeDashboard">
      </div>
  
      <div class="dbx-group">
        <label>Fecha hasta</label>
        <input type="date" id="fHastaDashboard">
      </div>
  
      <div class="dbx-group dbx-btn-group">
        <label>&nbsp;</label>
        <button id="btnLimpiarDashboard" class="dbx-btn dbx-btn-danger">
          Limpiar
        </button>
      </div>
  
    </div>
  
  </div>

  <!-- CARDS -->
  <div id="cardsDashboard" class="dbx-cards"></div>

  <!-- GRID PRINCIPAL -->
  <div class="dbx-main">

    <section class="dbx-left">

      <div class="dbx-table-card rentabilidad-full">
      
        <h2>Rentabilidad por Manifiesto</h2>
      
        <div class="tabla-scroll-wrap">
      
          <table class="dbx-table" id="tablaRentabilidadTable">
      
            <thead>
              <tr>
                <th>Manifiesto</th>
                <th>Cliente</th>
                <th>Valor Facturado</th>
                <th>Ingreso</th>
                <th>Egreso</th>
                <th>Gasto Conductor</th>
                <th>Utilidad</th>
                <th>Margen %</th>
              </tr>
            </thead>
      
            <tbody id="tablaRentabilidad"></tbody>
      
            <tfoot id="tablaRentabilidadTotal"></tfoot>
      
          </table>
      
        </div>
      
      </div>

      <!-- FILA: FACTURACION + GRAFICA -->
      <div class="dbx-row-50">
      
        <!-- IZQUIERDA -->
        <div class="dbx-table-card facturacion-half">
      
          <h2>Estado de Facturación</h2>
      
          <div class="tabla-scroll-wrap fact-scroll">
      
            <table class="dbx-table" id="tablaEstadoFacturacionTable">
      
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Facturado</th>
                  <th>Pagado</th>
                  <th>Pendiente</th>
                </tr>
              </thead>
      
              <tbody id="tablaEstadoFacturacion"></tbody>
      
              <tfoot id="tablaEstadoFacturacionTotal"></tfoot>
      
            </table>
      
          </div>
      
        </div>
      
        <!-- DERECHA -->
        <div class="dbx-chart-card grafica-half">
      
          <h3>Ingresos vs Egresos</h3>
      
          <div class="dbx-chart-wrap">
            <canvas id="graficaIE"></canvas>
          </div>
      
        </div>
      
      </div>

      <div class="dbx-chart-card">
        <h3>Gastos por Categoría</h3>
        <div class="dbx-chart-wrap">
          <canvas id="graficaCategorias"></canvas>
        </div>
      </div>

      <div class="dbx-chart-card">
        <h3>Top Clientes</h3>
        <div class="dbx-chart-wrap">
          <canvas id="graficaTopClientes"></canvas>
        </div>
      </div>

    </aside>

  </div>

</div>
