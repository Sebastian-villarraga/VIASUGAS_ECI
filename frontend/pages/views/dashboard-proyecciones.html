<!-- ==================================================
     DASHBOARD PROYECCIONES
     NUEVA DISTRIBUCIÓN:
     - Cards
     - 2 tablas lado a lado inmediatamente después
     - Luego gráficas
================================================== -->

<div class="dpr-layout">

  <!-- HEADER -->
  <div class="dpr-header">
    <h2>Dashboard de Proyecciones</h2>
  </div>

  <!-- FILTROS -->
  <div class="dpr-filters-box">

    <div class="dpr-toolbar">

      <button id="dprBtnMesAnterior" class="dpr-btn dpr-btn-light">
        Mes anterior
      </button>

      <button id="dprBtnMesActual" class="dpr-btn dpr-btn-primary">
        Este mes
      </button>
      
      <button id="dprBtnMesSiguiente" class="dpr-btn dpr-btn-light">
        Mes siguiente
      </button>

      <select id="dprFiltroAnio" class="dpr-select"></select>

      <button id="dprBtnQ1" class="dpr-btn dpr-btn-light">1er Q</button>
      <button id="dprBtnQ2" class="dpr-btn dpr-btn-light">2do Q</button>
      <button id="dprBtnQ3" class="dpr-btn dpr-btn-light">3er Q</button>
      <button id="dprBtnQ4" class="dpr-btn dpr-btn-light">4to Q</button>

      <button id="dprBtnS1" class="dpr-btn dpr-btn-light">1er Sem</button>
      <button id="dprBtnS2" class="dpr-btn dpr-btn-light">2do Sem</button>

      <button id="dprBtnAnio" class="dpr-btn dpr-btn-light">
        Ańo completo
      </button>

    </div>

    <div class="dpr-toolbar-bottom">

      <div class="dpr-group">
        <label>Fecha desde</label>
        <input type="date" id="dprFechaDesde">
      </div>

      <div class="dpr-group">
        <label>Fecha hasta</label>
        <input type="date" id="dprFechaHasta">
      </div>

      <div class="dpr-group dpr-btn-group">
        <label>&nbsp;</label>
        <button id="dprBtnLimpiar" class="dpr-btn dpr-btn-danger">
          Limpiar
        </button>
      </div>

    </div>

  </div>

  <!-- KPI -->
  <div id="dprCardsDashboard" class="dpr-cards"></div>

  <!-- ==================================================
       TABLAS LADO A LADO
  ================================================== -->
  <div class="dpr-main">

    

    <!-- TABLA 2 -->
    <aside class="dpr-right">

      <div class="dpr-table-card">

        <div class="dpr-card-header">
          <h3>Detalle de Proyección</h3>
        </div>

        <div class="dpr-table-scroll">

          <table class="dpr-table">

            <thead>
              <tr>
                <th>Cliente</th>
                <th>Empresa a Cargo</th>
                <th>Factura</th>
                <th>Emisión</th>
                <th>Vencimiento</th>
                <th>Bruto</th>
                <th>Rte Fuente</th>
                <th>Rte ICA</th>
                <th>Neto</th>
                <th>Pagado</th>
                <th>Pendiente</th>
              </tr>
            </thead>

            <tbody id="dprTablaDetalle"></tbody>

          </table>

        </div>

      </div>

    </aside>

  </div>

  <!-- ==================================================
       GRÁFICAS DEBAJO
  ================================================== -->
  <div class="dpr-main">

    <!-- IZQUIERDA -->
    <section class="dpr-left">

      <div class="dpr-chart-card">

        <div class="dpr-card-header">
          <h3>Proyección Mensual de Ingresos</h3>
        </div>

        <div class="dpr-chart-wrap">
          <canvas id="dprGraficaMensual"></canvas>
        </div>

      </div>

    </section>

    

  </div>

</div>
