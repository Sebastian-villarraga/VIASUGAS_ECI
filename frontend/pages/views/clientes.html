<div class="clx-layout">

  <section class="clx-main">

    <!-- HEADER -->
    <div class="clx-header">

      <h2>Clientes</h2>

      <button
        class="clx-btn clx-btn-primary"
        onclick="abrirModalCliente()"
      >
        <i class="fas fa-plus"></i>
        Agregar cliente
      </button>

    </div>

    <!-- FILTROS -->
    <div class="clx-filters-box">

      <div class="clx-filters-grid">

        <div class="clx-field">
          <label>NIT</label>
          <input type="text" id="filtroNit">
        </div>

        <div class="clx-field">
          <label>Nombre</label>
          <input type="text" id="filtroNombre">
        </div>

        <div class="clx-field">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <div class="clx-filter-action">
          <button
            class="clx-btn clx-btn-danger"
            onclick="limpiarFiltrosClientes()"
          >
            Limpiar
          </button>
        </div>

      </div>

    </div>

    <!-- TABLA -->
    <div class="clx-table-card">

      <div class="clx-table-scroll">

        <table class="clx-table">

          <thead>
            <tr>
              <th>NIT</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Dirección</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="clientesTable">
            <tr>
              <td colspan="7">Cargando...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

</div>

<!-- MODAL -->
<div id="modalCliente" class="clx-modal hidden">

  <div class="clx-modal-box">

    <h3>Agregar Cliente</h3>

    <form id="formCliente" class="clx-form-grid">

      <div class="clx-field">
        <label>NIT</label>
        <input
          type="text"
          id="nit"
          required
          placeholder="Ej: 860025900-2"
          autocomplete="off"
        >
      </div>

      <div class="clx-field">
        <label>Nombre</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="clx-field">
        <label>Correo</label>
        <input type="text" id="correo">
      </div>

      <div class="clx-field">
        <label>Teléfono</label>
        <input type="text" id="telefono">
      </div>

      <div class="clx-field clx-full">
        <label>Dirección</label>
        <input
          type="text"
          id="direccion"
          placeholder="Ej: Calle 10 # 25-30, Medellín"
          autocomplete="off"
        >
      </div>

      <div class="clx-field clx-full">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="clx-modal-actions">
        <button
          type="submit"
          class="clx-btn clx-btn-primary"
        >
          Guardar
        </button>
      </div>

    </form>

  </div>

</div>
