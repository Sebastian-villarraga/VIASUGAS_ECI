<div class="trailer-layout">

  <!-- ========================= -->
  <!-- IZQUIERDA -->
  <!-- ========================= -->
  <div class="trailer-left">

    <!-- HEADER -->
    <div class="trailer-header">
      <h2>Trailers</h2>
    </div>

    <!-- FILTROS -->
    <div class="trailer-filtros">
      <div class="filtros-row">
    
        <div class="filtro-group">
          <label>Placa</label>
          <input type="text" id="filtroPlaca" placeholder="Ej: ABC123">
        </div>
    
        <div class="filtro-group">
          <label>Propietario</label>
          <input type="text" id="filtroPropietario" placeholder="Nombre propietario">
        </div>
    
        <div class="filtro-group">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
    
        <button class="btn-limpiar" onclick="limpiarFiltros()">
          Limpiar
        </button>
    
      </div>
    </div>

    <!-- TABLA -->
    <div class="trailer-tabla">
      <div class="tabla-body">

        <table class="trailer-table">
          <thead>
            <tr>
              <th>Placa</th>
              <th>Propietario</th>
              <th>Cert. Fumigación</th>
              <th>Cert. Sanidad</th>
              <th>Estado</th>
              <th style="width: 80px;">Acciones</th>
            </tr>
          </thead>

          <tbody id="trailerTable">
            <tr>
              <td colspan="5">Cargando trailers...</td>
            </tr>
          </tbody>

        </table>

      </div>
    </div>

  </div>

  <!-- ========================= -->
  <!-- DERECHA -->
  <!-- ========================= -->
  <div class="trailer-right">

  <!-- BOTÓN -->
    <button class="btn-primary btn-add-right" onclick="abrirModalTrailer()">
      <i class="fas fa-plus"></i> Agregar trailer
    </button>
  
    <!-- PANEL -->
    <div class="trailer-side">
  
      <!-- ALERTAS -->
      <h3><i class="fas fa-exclamation-triangle"></i> Alertas</h3>
  
      <!-- RESUMEN -->
      <div class="alertas-resumen">
        <div class="alerta-box vencidos" onclick="filtrarVencidos()">
          <span id="countVencidos">0</span> vencidos
        </div>
  
        <div class="alerta-box proximos" onclick="filtrarProximos()">
          <span id="countProximos">0</span> por vencer
        </div>
      </div>
  
      <!-- LISTA -->
      <div id="alertasList" class="alertas-list">
        <div>Cargando alertas...</div>
      </div>
  
    </div>
  
  </div>

</div>

<!-- ========================= -->
<!-- MODAL TRAILER -->
<!-- ========================= -->
<div id="modalTrailer" class="modal hidden">

  <div class="modal-content">

    <h3>Agregar Trailer</h3>

    <form id="formTrailer" class="form-grid">

      <div class="form-group">
        <label>Placa</label>
        <input type="text" id="placaTrailer" required>
      </div>

      <div class="form-group">
        <label for="propietarioTrailer">Propietario</label>
        <select id="propietarioTrailer" required>
          <option value="">Seleccionar propietario</option>
        </select>
      </div>

      <div class="form-group">
        <label>Cert. Fumigación</label>
        <input type="date" id="fumigacion">
      </div>
      
      <div class="form-group">
        <label>Cert. Sanidad</label>
        <input type="date" id="sanidad">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select id="estadoTrailer">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="submit" class="btn-primary">
          Guardar
        </button>

        <button type="button" onclick="cerrarModalTrailer()">
          Cancelar
        </button>
      </div>

    </form>

  </div>

</div>
