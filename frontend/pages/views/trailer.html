<div class="thx-layout">

  <!-- IZQUIERDA -->
  <section class="thx-main">

    <div class="thx-header">
      <h2>Trailers</h2>
    </div>

    <!-- FILTROS -->
    <div class="thx-filters-box">

      <div class="thx-filters-grid">

        <div class="thx-field">
          <label>Placa</label>
          <input
            type="text"
            id="filtroPlaca"
            placeholder="Ej: ABC123"
          >
        </div>

        <div class="thx-field">
          <label>Propietario</label>
          <input
            type="text"
            id="filtroPropietario"
            placeholder="Nombre propietario"
          >
        </div>

        <div class="thx-field">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <div class="thx-filter-action">
          <button
            class="thx-btn thx-btn-danger"
            onclick="limpiarFiltros()"
          >
            Limpiar
          </button>
        </div>

      </div>

    </div>

    <!-- TABLA -->
    <div class="thx-table-card">

      <div class="thx-table-scroll">

        <table class="thx-table">

          <thead>
            <tr>
              <th>Placa</th>
              <th>Propietario</th>
              <th>Cert. Fumigación</th>
              <th>Cert. Sanidad</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="trailerTable">
            <tr>
              <td colspan="6">Cargando trailers...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

  <!-- DERECHA -->
  <aside class="thx-sidebar">

    <button
      class="thx-btn thx-btn-primary thx-btn-full"
      onclick="abrirModalTrailer()"
    >
      <i class="fas fa-plus"></i>
      Agregar trailer
    </button>

    <div class="thx-alert-card">

      <h3>
        <i class="fas fa-exclamation-triangle"></i>
        Alertas
      </h3>

      <div class="thx-alert-actions">
      
        <button
          type="button"
          class="thx-alert-summary thx-alert-summary-danger"
          onclick="filtrarVencidos()"
        >
          <span id="countVencidos">0</span> vencidos
        </button>
      
        <button
          type="button"
          class="thx-alert-summary thx-alert-summary-warn"
          onclick="filtrarProximos()"
        >
          <span id="countProximos">0</span> por vencer
        </button>
      
      </div>

      <div id="alertasList" class="thx-alert-list">
        <div>Cargando alertas...</div>
      </div>

    </div>

  </aside>

</div>

<!-- MODAL -->
<div id="modalTrailer" class="thx-modal hidden">

  <div class="thx-modal-box">

    <h3>Agregar Trailer</h3>

    <form id="formTrailer" class="thx-form-grid">

      <div class="thx-field">
        <label>Placa</label>
        <input type="text" id="placaTrailer" required>
      </div>

      <div class="thx-field">
        <label for="propietarioTrailer">Propietario</label>
        <select id="propietarioTrailer" required>
          <option value="">Seleccionar propietario</option>
        </select>
      </div>

      <div class="thx-field">
        <label>Cert. Fumigación</label>
        <input type="date" id="fumigacion">
      </div>

      <div class="thx-field">
        <label>Cert. Sanidad</label>
        <input type="date" id="sanidad">
      </div>

      <div class="thx-field">
        <label>Estado</label>
        <select id="estadoTrailer">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="thx-modal-actions">

       

        <button
          type="submit"
          class="thx-btn thx-btn-primary"
        >
          Guardar
        </button>

      </div>

    </form>

  </div>

</div>
