<div class="ttx-layout">

  <section class="ttx-main">

    <!-- HEADER -->
    <div class="ttx-header">

      <h2>Categoria Gastos</h2>

      <button
        class="ttx-btn ttx-btn-primary"
        onclick="abrirModalTipo()"
      >
        <i class="fas fa-plus"></i>
        Agregar tipo
      </button>

    </div>

    <!-- FILTROS -->
    <div class="ttx-filters-box">

      <div class="ttx-filters-grid">

        <div class="ttx-field">
          <label>Categoría</label>
          <input type="text" id="filtroCategoria">
        </div>

        <div class="ttx-field">
          <label>Tipo</label>
          <select id="filtroTipo">
            <option value="">Todos</option>
            <option value="INGRESO MANIFIESTO">Ingreso Manifiesto</option>
            <option value="EGRESO MANIFIESTO">Egreso Manifiesto</option>
            <option value="EGRESO OPERACIONAL">Egreso Operacional</option>
            <option value="GASTO CONDUCTOR">Gasto Conductor</option>
          </select>
        </div>

        <div class="ttx-field">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <div class="ttx-filter-action">
          <button
            class="ttx-btn ttx-btn-danger"
            onclick="limpiarFiltrosTipos()"
          >
            Limpiar
          </button>
        </div>

      </div>

    </div>

    <!-- TABLA -->
    <div class="ttx-table-card">

      <div class="ttx-table-scroll">

        <table class="ttx-table">

          <thead>
            <tr>
              <th>Categoría</th>
              <th>Descripción</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tiposTable">
            <tr>
              <td colspan="5">Cargando...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

</div>

<!-- MODAL -->
<div id="modalTipo" class="ttx-modal hidden">

  <div class="ttx-modal-box">

    <h3 id="modalTitulo">Agregar Categoria de gastos</h3>

    <form id="formTipo" class="ttx-form-grid">

      <!-- CATEGORIA -->
      <div class="ttx-field">
        <label>Categoría</label>
        <input
          id="categoria"
          placeholder="Ej: Combustible"
          required
        >
      </div>

      <!-- TIPO -->
      <div class="ttx-field">
        <label>Tipo</label>
        <select id="tipo" required>
          <option value="">Seleccione tipo</option>
          <option value="INGRESO MANIFIESTO">Ingreso Manifiesto</option>
          <option value="EGRESO MANIFIESTO">Egreso Manifiesto</option>
          <option value="EGRESO OPERACIONAL">Egreso Operacional</option>
          <option value="GASTO CONDUCTOR">Gasto Conductor</option>
        </select>
      </div>

      <!-- DESCRIPCION -->
      <div class="ttx-field ttx-full">
        <label>Descripción</label>
        <input
          id="descripcion"
          placeholder="Detalle opcional"
        >
      </div>

      <!-- ESTADO -->
      <div class="ttx-field">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <!-- BOTON -->
      <div class="ttx-modal-actions">
        <button
          type="submit"
          class="ttx-btn ttx-btn-primary"
        >
          Guardar
        </button>
      </div>

    </form>

  </div>

</div>
