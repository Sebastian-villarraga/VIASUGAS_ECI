<div class="empresa-layout">

  <div class="empresa-left">

    <!-- HEADER -->
    <div class="empresa-header">
      <h2>Categoria Gastos</h2>

      <button class="btn-secundario" onclick="abrirModalTipo()">
        <i class="fas fa-plus"></i> Agregar tipo
      </button>
    </div>

    <!-- FILTROS -->
    <div class="empresa-filtros">
      <div class="filtros-row">

        <div class="filtro-group">
          <label>Categoría</label>
          <input type="text" id="filtroCategoria">
        </div>

        <div class="filtro-group">
          <label>Tipo</label>
          <select id="filtroTipo">
            <option value="">Todos</option>
            <option value="INGRESO MANIFIESTO">Ingreso Manifiesto</option>
            <option value="EGRESO MANIFIESTO">Egreso Manifiesto</option>
            <option value="EGRESO OPERACIONAL">Egreso Operacional</option>
          </select>
        </div>

        <div class="filtro-group">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <button class="btn-limpiar" onclick="limpiarFiltrosTipos()">
          Limpiar
        </button>

      </div>
    </div>

    <!-- TABLA -->
    <div class="empresa-tabla">
      <div class="tabla-body">
    
        <table class="empresa-table">
          <thead>
            <tr>
              <th>Categoría</th>
              <th>Descripción</th>
              <th>Tipo</th> 
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
    
          <tbody id="tiposTable">
            <tr><td colspan="5">Cargando...</td></tr> 
          </tbody>
    
        </table>
    
      </div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modalTipo" class="modal hidden">
  <div class="modal-content">

    <h3 id="modalTitulo">Agregar Tipo de Transacción</h3>

    <form id="formTipo" class="form-grid">

      <!-- CATEGORIA -->
      <div class="form-group">
        <label>Categoría</label>
        <input id="categoria" placeholder="Ej: Combustible" required>
      </div>

      <!-- TIPO -->
      <div class="form-group">
        <label>Tipo</label>
        <select id="tipo" required>
          <option value="">Seleccione tipo</option>
          <option value="INGRESO MANIFIESTO">Ingreso Manifiesto</option>
          <option value="EGRESO MANIFIESTO">Egreso Manifiesto</option>
          <option value="EGRESO OPERACIONAL">Egreso Operacional</option>
        </select>
      </div>

      <!-- DESCRIPCION -->
      <div class="form-group full">
        <label>Descripción</label>
        <input id="descripcion" placeholder="Detalle opcional">
      </div>

      <!-- ESTADO -->
      <div class="form-group">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <!-- ACCIONES -->
      <div class="modal-actions">
        <button type="button" class="btn-secundario" onclick="cerrarModalTipo()">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar</button>
      </div>

    </form>

  </div>
</div>
