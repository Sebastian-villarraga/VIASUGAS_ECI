<!-- dashboard-contable.html -->
<div class="dbcx-layout">

  <div class="dbcx-header">
    <h2>Dashboard Contable</h2>
  </div>

  <!-- FILTROS FULL WIDTH -->
  <div class="dbcx-filters-box dbcx-full">

    <!-- FILA 1 -->
    <div class="dbcx-toolbar">

      <button id="dbcxBtnMesAnterior" class="dbcx-btn dbcx-btn-light">
        Mes anterior
      </button>

      <button id="dbcxBtnMesActual" class="dbcx-btn dbcx-btn-primary">
        Este mes
      </button>

      <select id="dbcxFiltroAnio" class="dbcx-select"></select>

      <button class="dbcx-btn dbcx-btn-light" id="dbcxBtnQ1">1er Q</button>
      <button class="dbcx-btn dbcx-btn-light" id="dbcxBtnQ2">2do Q</button>
      <button class="dbcx-btn dbcx-btn-light" id="dbcxBtnQ3">3er Q</button>
      <button class="dbcx-btn dbcx-btn-light" id="dbcxBtnQ4">4to Q</button>

      <button class="dbcx-btn dbcx-btn-light" id="dbcxBtnS1">1er Sem</button>
      <button class="dbcx-btn dbcx-btn-light" id="dbcxBtnS2">2do Sem</button>
      <button class="dbcx-btn dbcx-btn-light" id="dbcxBtnAnioCompleto">Ańo completo</button>

    </div>

    <!-- FILA 2 -->
    <div class="dbcx-toolbar-bottom">

      <div class="dbcx-group">
        <label>Fecha desde</label>
        <input type="date" id="dbcxFechaDesde">
      </div>

      <div class="dbcx-group">
        <label>Fecha hasta</label>
        <input type="date" id="dbcxFechaHasta">
      </div>

      <div class="dbcx-group dbcx-btn-group">
        <label>&nbsp;</label>
        <button id="dbcxBtnLimpiar" class="dbcx-btn dbcx-btn-danger">
          Limpiar
        </button>
      </div>

    </div>

  </div>

  <!-- CARDS -->
  <div id="dbcxCardsDashboard" class="dbcx-cards"></div>

  <!-- GRID PRINCIPAL -->
  <div class="dbcx-main">

    <!-- COLUMNA IZQUIERDA -->
    <section class="dbcx-left">

      <!-- ESTADO DE RESULTADOS -->
      <div class="dbcx-chart-card">
        <h3>Estado de Resultados Mensual</h3>

        <div class="dbcx-chart-wrap">
          <canvas id="dbcxGraficaEstadoResultados"></canvas>
        </div>
      </div>

      <!-- RESUMEN MENSUAL -->
      <div class="dbcx-table-card">
        <h2>Resumen Mensual Contable</h2>

        <div class="dbcx-table-scroll">
          <table class="dbcx-table">
            <thead>
              <tr>
                <th>Mes</th>
                <th>Facturas</th>
                <th>Total Facturado</th>
                <th>Ingresos</th>
                <th>Egresos</th>
                <th>Utilidad</th>
                <th>Margen %</th>
              </tr>
            </thead>

            <tbody id="dbcxTablaResumenMensual"></tbody>
          </table>
        </div>
      </div>
      
      
      
      <div class="dbcx-row-50">
      
        <!-- IZQUIERDA = TABLA -->
        <div class="dbcx-table-card">
      
          <h2>Flujo por Banco</h2>
      
          <div class="dbcx-table-scroll">
      
            <table class="dbcx-table">
      
              <thead>
                <tr>
                  <th>Banco</th>
                  <th>Ingresó</th>
                  <th>Salió</th>
                </tr>
              </thead>
      
              <tbody id="dbcxTablaFlujoBancos"></tbody>
      
            </table>
      
          </div>
      
        </div>
      
        <!-- DERECHA = GRAFICA -->
        <div class="dbcx-chart-card">
      
          <h3>Entradas vs Salidas por Banco</h3>
      
          <div class="dbcx-chart-wrap">
            <canvas id="dbcxGraficaFlujoBancos"></canvas>
          </div>
      
        </div>
      
      </div>

      

    </section>

    <!-- COLUMNA DERECHA -->
    <aside class="dbcx-right">

      <div class="dbcx-chart-card">
        <h3>Utilidad Mensual</h3>

        <div class="dbcx-chart-wrap">
          <canvas id="dbcxGraficaUtilidadMensual"></canvas>
        </div>
      </div>

      

    </aside>

  </div>

</div>
