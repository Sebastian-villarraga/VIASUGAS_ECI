<div class="emx-layout">

  <section class="emx-main">

    <!-- HEADER -->
    <div class="emx-header">

      <h2>Empresas a Cargo</h2>

      <button
        class="emx-btn emx-btn-primary"
        onclick="abrirModalEmpresa()"
      >
        <i class="fas fa-plus"></i>
        Agregar empresa
      </button>

    </div>

    <!-- FILTROS -->
    <div class="emx-filters-box">

      <div class="emx-filters-grid">

        <div class="emx-field">
          <label>NIT</label>
          <input type="text" id="filtroNit">
        </div>

        <div class="emx-field">
          <label>Nombre</label>
          <input type="text" id="filtroNombre">
        </div>

        <div class="emx-field">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <div class="emx-filter-action">
          <button
            class="emx-btn emx-btn-danger"
            onclick="limpiarFiltrosEmpresas()"
          >
            Limpiar
          </button>
        </div>

      </div>

    </div>

    <!-- TABLA -->
    <div class="emx-table-card">

      <div class="emx-table-scroll">

        <table class="emx-table">

          <thead>
            <tr>
              <th>NIT</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Dirección</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="empresasTable">
            <tr>
              <td colspan="7">Cargando...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

</div>

<!-- MODAL -->
<div id="modalEmpresa" class="emx-modal hidden">

  <div class="emx-modal-box">

    <h3>Agregar Empresa a Cargo</h3>

    <form id="formEmpresa" class="emx-form-grid">

      <div class="emx-field">
        <label>NIT</label>
        <input type="text" id="nit" required>
      </div>

      <div class="emx-field">
        <label>Nombre</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="emx-field">
        <label>Correo</label>
        <input type="text" id="correo">
      </div>

      <div class="emx-field">
        <label>Teléfono</label>
        <input type="text" id="telefono">
      </div>

      <div class="emx-field emx-full">
        <label>Dirección</label>
        <input
          type="text"
          id="direccion"
          placeholder="Ej: Calle 12 # 23-65, Bogotá"
        >
      </div>

      <div class="emx-field emx-full">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="emx-modal-actions">
        <button
          type="submit"
          class="emx-btn emx-btn-primary"
        >
          Guardar
        </button>
      </div>

    </form>

  </div>

</div>
