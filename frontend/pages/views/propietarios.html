<div class="propietario-layout">

  <div class="propietario-left">

    <!-- HEADER -->
    <div class="propietario-header">
      <h2>Propietarios</h2>

      <button class="btn-secundario" onclick="abrirModalPropietario()">
        <i class="fas fa-plus"></i> Agregar propietario
      </button>
    </div>

    <!-- FILTROS -->
    <div class="propietario-filtros">
      <div class="filtros-row">
    
        <div class="filtro-group">
          <label>Nombre</label>
          <input type="text" id="filtroNombre" placeholder="Nombre">
        </div>
    
        <div class="filtro-group">
          <label>Identificaciˇn</label>
          <input type="text" id="filtroIdentificacion" placeholder="CÚdula / NIT">
        </div>
    
        <button class="btn-limpiar" onclick="limpiarFiltrosProp()">
          Limpiar
        </button>
    
      </div>
    </div>

    <!-- TABLA -->
    <div class="propietario-tabla">
      <div class="tabla-body">

        <table class="propietario-table">
          <thead>
            <tr>
              <th>Identificaciˇn</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>TelÚfono</th>
              <th style="width: 80px;">Acciones</th>
            </tr>
          </thead>

          <tbody id="propietariosTable">
            <tr>
              <td colspan="5">Cargando propietarios...</td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modalPropietario" class="modal hidden">

  <div class="modal-content">

    <h3>Agregar Propietario</h3>

    <form id="formPropietario" class="form-grid">

      <div class="form-group">
        <label>Identificaciˇn</label>
        <input type="text" id="identificacion" required>
      </div>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="form-group">
        <label>Correo</label>
        <input type="email" id="correo">
      </div>

      <div class="form-group">
        <label>TelÚfono</label>
        <input type="number" id="telefono">
      </div>

      <div class="modal-actions">
        <button type="submit" class="btn-primary">Guardar</button>
        <button type="button" onclick="cerrarModalPropietario()">Cancelar</button>
      </div>

    </form>

  </div>

</div>
