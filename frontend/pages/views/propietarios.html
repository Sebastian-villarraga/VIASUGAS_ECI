<div class="prx-layout">

  <section class="prx-main">

    <!-- HEADER -->
    <div class="prx-header">

      <h2>Propietarios</h2>

      <button
        class="prx-btn prx-btn-primary"
        onclick="abrirModalPropietario()"
      >
        <i class="fas fa-plus"></i>
        Agregar propietario
      </button>

    </div>

    <!-- FILTROS -->
    <div class="prx-filters-box">

      <div class="prx-filters-grid">

        <div class="prx-field">
          <label>Nombre</label>
          <input
            type="text"
            id="filtroNombre"
            placeholder="Nombre"
          >
        </div>

        <div class="prx-field">
          <label>Identificación</label>
          <input
            type="text"
            id="filtroIdentificacion"
            placeholder="Cédula / NIT"
          >
        </div>

        <div class="prx-filter-action">
          <button
            class="prx-btn prx-btn-danger"
            onclick="limpiarFiltrosProp()"
          >
            Limpiar
          </button>
        </div>

      </div>

    </div>

    <!-- TABLA -->
    <div class="prx-table-card">

      <div class="prx-table-scroll">

        <table class="prx-table">

          <thead>
            <tr>
              <th>Identificación</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th style="width:80px;">Acciones</th>
            </tr>
          </thead>

          <tbody id="propietariosTable">
            <tr>
              <td colspan="5">Cargando propietarios...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

</div>

<!-- MODAL -->
<div id="modalPropietario" class="prx-modal hidden">

  <div class="prx-modal-box">

    <h3>Agregar Propietario</h3>

    <form id="formPropietario" class="prx-form-grid">

      <div class="prx-field">
        <label>Identificación</label>
        <input type="text" id="identificacion" required>
      </div>

      <div class="prx-field">
        <label>Nombre</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="prx-field">
        <label>Correo</label>
        <input type="email" id="correo">
      </div>

      <div class="prx-field">
        <label>Teléfono</label>
        <input type="number" id="telefono">
      </div>

      <div class="prx-modal-actions">
        <button
          type="submit"
          class="prx-btn prx-btn-primary"
        >
          Guardar
        </button>
      </div>

    </form>

  </div>

</div>
