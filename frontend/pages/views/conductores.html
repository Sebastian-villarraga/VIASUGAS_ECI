<div class="conductor-layout">

  <!-- IZQUIERDA -->
  <div class="conductor-left">

    <div class="conductor-header">
      <h2>Conductores</h2>
    </div>

    <!-- FILTROS -->
    <div class="conductor-filtros">
      <div class="filtros-row">

        <div class="filtro-group">
          <label>Nombre</label>
          <input type="text" id="filtroNombre">
        </div>

        <div class="filtro-group">
          <label>Cédula</label>
          <input type="text" id="filtroCedula">
        </div>

        <div class="filtro-group">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <button class="btn-limpiar" onclick="limpiarFiltrosConductores()">
          Limpiar
        </button>

      </div>
    </div>

    <!-- TABLA -->
    <div class="conductor-tabla">
      <div class="tabla-body">

        <table class="conductor-table">
          <thead>
            <tr>
              <th>Cédula</th>
              <th>Nombre</th>
              <th>Licencia</th>
              <th>Alimentos</th>
              <th>Sustancias</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="conductoresTable">
            <tr>
              <td colspan="7">Cargando...</td>
            </tr>
          </tbody>

        </table>

      </div>
    </div>

  </div>

  <!-- DERECHA -->
  <div class="conductor-right">

    <button class="btn-primary btn-add-right" onclick="abrirModalConductor()">
      <i class="fas fa-plus"></i> Agregar conductor
    </button>

    <div class="conductor-side">

      <h3>
        <i class="fas fa-exclamation-triangle"></i> Alertas
      </h3>

      <ul id="alertasConductores">
        <li>Cargando alertas...</li>
      </ul>

    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modalConductor" class="modal hidden">
  <div class="modal-content">

    <h3>Agregar Conductor</h3>

    <form id="formConductor">

      <div class="form-group">
        <label>Cédula</label>
        <input type="text" id="cedula" required>
      </div>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="form-group">
        <label>Correo</label>
        <input type="text" id="correo">
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="telefono">
      </div>

      <div class="form-group full">
        <label>Licencia</label>
        <input type="date" id="licencia" required>
      </div>

      <div class="form-group full">
        <label>Manipulación alimentos</label>
        <input type="date" id="alimentos" required>
      </div>

      <div class="form-group full">
        <label>Sustancias peligrosas</label>
        <input type="date" id="sustancias" required>
      </div>

      <div class="form-group full">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" onclick="cerrarModalConductor()" class="btn-secondary">
          Cancelar
        </button>

        <button type="submit" class="btn-primary">
          Guardar
        </button>
      </div>

    </form>

  </div>
</div>
