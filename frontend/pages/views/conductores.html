<div class="drx-layout">

  <!-- IZQUIERDA -->
  <section class="drx-main">

    <div class="drx-header">
      <h2>Conductores</h2>
    </div>

    <!-- FILTROS -->
    <div class="drx-filters-box">

      <div class="drx-filters-grid">

        <div class="drx-field">
          <label>Nombre</label>
          <input type="text" id="filtroNombre">
        </div>

        <div class="drx-field">
          <label>CÈdula</label>
          <input type="text" id="filtroCedula">
        </div>

        <div class="drx-field">
          <label>Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <div class="drx-filter-action">
          <button
            class="drx-btn drx-btn-danger"
            onclick="limpiarFiltrosConductores()"
          >
            Limpiar
          </button>
        </div>

      </div>

    </div>

    <!-- TABLA -->
    <div class="drx-table-card">

      <div class="drx-table-scroll">

        <table class="drx-table">

          <thead>
            <tr>
              <th>CÈdula</th>
              <th>Nombre</th>
              <th>Licencia</th>
              <th>Alimentos</th>
              <th>Sustancias</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="conductoresTable">
            <tr>
              <td colspan="7">Cargando...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

  <!-- DERECHA -->
  <aside class="drx-sidebar">

    <button
      class="drx-btn drx-btn-primary drx-btn-full"
      onclick="abrirModalConductor()"
    >
      <i class="fas fa-plus"></i>
      Agregar conductor
    </button>

    <!-- ALERTAS -->
    <div class="drx-alert-card">

      <h3>
        <i class="fas fa-exclamation-triangle"></i>
        Alertas
      </h3>

      <div class="drx-alert-list">
        <ul id="alertasConductores">
          <li>Cargando alertas...</li>
        </ul>
      </div>

    </div>

  </aside>

</div>

<!-- MODAL -->
<div id="modalConductor" class="drx-modal hidden">

  <div class="drx-modal-box">

    <h3>Agregar Conductor</h3>

    <form id="formConductor" class="drx-form-grid">

      <div class="drx-field">
        <label>CÈdula</label>
        <input type="text" id="cedula" required>
      </div>

      <div class="drx-field">
        <label>Nombre</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="drx-field">
        <label>Correo</label>
        <input type="text" id="correo">
      </div>

      <div class="drx-field">
        <label>TelÈfono</label>
        <input type="text" id="telefono">
      </div>

      <div class="drx-field drx-full">
        <label>Licencia</label>
        <input type="date" id="licencia" required>
      </div>

      <div class="drx-field drx-full">
        <label>ManipulaciÛn alimentos</label>
        <input type="date" id="alimentos" required>
      </div>

      <div class="drx-field drx-full">
        <label>Sustancias peligrosas</label>
        <input type="date" id="sustancias" required>
      </div>

      <div class="drx-field drx-full">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="drx-modal-actions">
        <button
          type="submit"
          class="drx-btn drx-btn-primary"
        >
          Guardar
        </button>
      </div>

    </form>

  </div>

</div>
