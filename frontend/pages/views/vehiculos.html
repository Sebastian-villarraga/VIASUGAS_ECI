<div class="vhx-layout">

  <!-- IZQUIERDA -->
  <section class="vhx-main">

    <div class="vhx-header">
      <h2>Vehículos</h2>
    </div>

    <!-- FILTROS -->
    <div class="vhx-filters-box">
      <div class="vhx-filters-grid">

        <div class="vhx-field">
          <label>Placa</label>
          <input
            type="text"
            id="filtroPlaca"
            placeholder="Ej: ABC123"
            oninput="aplicarFiltrosVehiculos()"
          >
        </div>

        <div class="vhx-field">
          <label>Propietario</label>
          <input
            type="text"
            id="filtroPropietario"
            placeholder="Nombre propietario"
            oninput="aplicarFiltrosVehiculos()"
          >
        </div>

        <div class="vhx-field">
          <label>Estado</label>
          <select
            id="filtroEstado"
            onchange="aplicarFiltrosVehiculos()"
          >
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>

        <div class="vhx-actions-filter">
          <button
            type="button"
            class="vhx-btn vhx-btn-danger"
            onclick="limpiarFiltrosVehiculos()"
          >
            Limpiar
          </button>
        </div>

      </div>
    </div>

    <!-- TABLA -->
    <div class="vhx-table-card">

      <div class="vhx-table-scroll">

        <table class="vhx-table">

          <thead>
            <tr>
              <th>Placa</th>
              <th>Propietario</th>
              <th>Todo Riesgo</th>
              <th>SOAT</th>
              <th>Tecnomecánica</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="vehiculosTable">
            <tr>
              <td colspan="7">Cargando vehículos...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </section>

  <!-- DERECHA -->
  <aside class="vhx-sidebar">

    <button
      class="vhx-btn vhx-btn-primary vhx-btn-full"
      onclick="abrirModalVehiculo()"
    >
      <i class="fas fa-plus"></i>
      Agregar vehículo
    </button>

    <div class="vhx-alert-card">

      <h3>
        <i class="fas fa-exclamation-triangle"></i>
        Alertas
      </h3>

      <div class="vhx-alert-actions">

        <button id="btnVencidos" onclick="filtrarVehiculosVencidos()">
          0 vencidos
        </button>

        <button id="btnProximos" onclick="filtrarVehiculosProximos()">
          0 por vencer
        </button>

      </div>

      <div class="vhx-alert-list">
        <ul id="alertasList">
          <li>Cargando alertas...</li>
        </ul>
      </div>

    </div>

  </aside>

</div>

<!-- MODAL -->
<div id="modalVehiculo" class="vhx-modal hidden">

  <div class="vhx-modal-box">

    <h3>Agregar Vehículo</h3>

    <form id="formVehiculo" class="vhx-form-grid">

      <div class="vhx-field">
        <label>Placa</label>
        <input type="text" id="placa" required>
      </div>

      <div class="vhx-field">
        <label for="propietario">Propietario</label>
        <select id="propietario" required>
          <option value="">Seleccionar propietario</option>
        </select>
      </div>

      <div class="vhx-field">
        <label>SOAT</label>
        <input type="date" id="soat">
      </div>

      <div class="vhx-field">
        <label>Tecnomecánica</label>
        <input type="date" id="tecno">
      </div>

      <div class="vhx-field">
        <label>Todo Riesgo</label>
        <input type="date" id="todoRiesgo">
      </div>

      <div class="vhx-field">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="vhx-modal-actions">



        <button
          type="submit"
          class="vhx-btn vhx-btn-primary"
        >
          Guardar
        </button>

      </div>

    </form>

  </div>

</div>

<div id="toast" class="toast hidden"></div>
