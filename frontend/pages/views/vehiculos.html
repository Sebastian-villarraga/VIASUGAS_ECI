<div class="vehiculo-layout">

  <!-- IZQUIERDA -->
  <div class="vehiculo-left">

    <div class="vehiculo-header">
      <h2>Vehículos</h2>
    </div>

    <!-- FILTROS -->
    <div class="vehiculo-filtros">
      <div class="filtros-row">
    
        <div class="filtro-group">
          <label>Placa</label>
          <input 
            type="text" 
            id="filtroPlaca" 
            placeholder="Ej: ABC123"
            oninput="aplicarFiltrosVehiculos()"
          >
        </div>
    
        <div class="filtro-group">
          <label>Propietario</label>
          <input 
            type="text" 
            id="filtroPropietario" 
            placeholder="Nombre propietario"
            oninput="aplicarFiltrosVehiculos()"
          >
        </div>
    
        <div class="filtro-group">
          <label>Estado</label>
          <select 
            id="filtroEstado"
            onchange="aplicarFiltrosVehiculos()"
          >
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
    
        <button type="button" class="btn-limpiar" onclick="limpiarFiltros()">
          Limpiar
        </button>
    
      </div>
</div>

    <!-- TABLA -->
    <div class="vehiculo-tabla">
      <div class="tabla-body">

        <table class="vehiculo-table">
          <thead>
            <tr>
              <th>Placa</th>
              <th>Propietario</th>
              <th>Todo Riesgo</th>
              <th>SOAT</th>
              <th>Tecnomecánica</th>
              <th>Estado</th>
              <th style="width: 80px;">Acciones</th>
            </tr>
          </thead>

          <tbody id="vehiculosTable">
            <tr>
              <td colspan="7">Cargando vehículos...</td>
            </tr>
          </tbody>

        </table>

      </div>
    </div>

  </div>

  <!-- DERECHA -->
  <div class="vehiculo-right">

    <button class="btn-primary btn-add-right" onclick="abrirModalVehiculo()">
      <i class="fas fa-plus"></i> Agregar vehículo
    </button>

    <div class="vehiculo-side">

      <h3><i class="fas fa-exclamation-triangle"></i> Alertas</h3>

      <ul id="alertasList">
        <li>Cargando alertas...</li>
      </ul>

      <hr style="margin:15px 0;">

      <h3><i class="fas fa-bolt"></i> Acciones rápidas</h3>

      <div class="acciones-rapidas">
        <button onclick="filtrarVencidos()">
          <i class="fas fa-times-circle"></i> Ver vencidos
        </button>

        <button onclick="filtrarProximos()">
          <i class="fas fa-clock"></i> Por vencer
        </button>
      </div>

    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modalVehiculo" class="modal hidden">

  <div class="modal-content">

    <h3>Agregar Vehículo</h3>

    <form id="formVehiculo" class="form-grid">

      <div class="form-group">
        <label>Placa</label>
        <input type="text" id="placa" required>
      </div>

      <div class="form-group">
        <label>Propietario</label>
        <input type="text" id="propietario">
      </div>

      <div class="form-group">
        <label>SOAT</label>
        <input type="date" id="soat">
      </div>

      <div class="form-group">
        <label>Tecnomecánica</label>
        <input type="date" id="tecno">
      </div>

      <div class="form-group">
        <label>Todo Riesgo</label>
        <input type="date" id="todoRiesgo">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="submit" class="btn-primary">
          <i class="fas fa-save"></i> Guardar
        </button>

        <button type="button" onclick="cerrarModalVehiculo()">
          Cancelar
        </button>
      </div>

    </form>

  </div>

</div>
