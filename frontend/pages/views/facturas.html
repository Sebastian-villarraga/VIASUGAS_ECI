<div class="transacciones-layout">

  <!-- HEADER -->
  <div class="transacciones-header">
    <h2>Facturas</h2>
    <button id="btnNuevaFactura" class="btn-secundario">
      + Nueva Factura
    </button>
  </div>

  <!-- CARDS -->
  <div class="transacciones-cards">

    <div class="card ingreso">
      <h3>Total Facturado</h3>
      <p id="totalFacturado">$0</p>
    </div>
  
    <div class="card cobrado">
      <h3>Total Cobrado</h3>
      <p id="totalCobrado">$0</p>
    </div>
  
    <div class="card pendiente">
      <h3>Cartera</h3>
      <p id="totalPendiente">$0</p>
    </div>
  
    <div class="card porcentaje">
      <h3>% Cobro</h3>
      <p id="porcentajeCobro">0%</p>
    </div>
  
  </div>

  <!-- FILTROS -->
  <div class="transacciones-filtros">
    <input type="date" id="fDesde">
    <input type="date" id="fHasta">

    <input type="text" id="fCodigo" placeholder="Código factura">

    <select id="fManifiesto">
      <option value="">Todos los manifiestos</option>
    </select>

    <button id="btnLimpiarFacturas">Limpiar</button>
  </div>

  <!-- TABLA -->
  <div class="transacciones-tabla">
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Manifiesto</th>
          <th>Emisión</th>
          <th>Vencimiento</th>
          <th>Valor</th>
          <th>Ret. Fuente</th>
          <th>Ret. ICA</th>
          <th>Neto</th>
          <th>Estado</th>
          <th>Acciones</th> 
        </tr>
      </thead>
      <tbody id="tablaFacturas"></tbody>
    </table>
  </div>

</div>


<!-- MODAL FACTURA -->
<div id="modalFactura" class="modal hidden">
  <div class="modal-content modal-factura">

    <h3>Nueva Factura</h3>

    <div class="form-grid">

      <!-- 🔥 ELIMINADO CODIGO FACTURA -->

      <div class="form-group">
        <label>Manifiesto</label>
        <select id="manifiestoFactura" required>
          <option value="">Seleccione</option>
        </select>
      </div>

      <div class="form-group">
        <label>Fecha emisión</label>
        <input type="date" id="fechaEmision" required>
      </div>

      <div class="form-group">
        <label>Fecha vencimiento</label>
        <input type="date" id="fechaVencimiento">
      </div>

      <div class="form-group">
        <label>Valor total</label>
        <input type="number" id="valorFactura" placeholder="$0" min="0" required>
      </div>

      <div class="form-group">
        <label>Plazo (días)</label>
        <input type="number" id="plazoPago" placeholder="Ej: 30" min="0">
      </div>

      <div class="form-group">
        <label>Retención fuente</label>
        <input type="number" id="retencionFuente" placeholder="$0" min="0">
      </div>

      <div class="form-group">
        <label>Retención ICA</label>
        <input type="number" id="retencionIca" placeholder="$0" min="0">
      </div>

    </div>

    <!-- BOTONES -->
    <div class="modal-actions">
      <button type="button" id="cancelarFactura" class="btn-cancelar">
        Cancelar
      </button>
      <button type="button" id="guardarFactura" class="btn-guardar">
        Guardar
      </button>
    </div>

  </div>
</div>

<!-- ✅ MODAL CONFIRMACION -->
<div id="modalConfirmacion" class="modal hidden">
  <div class="modal-content confirm-modal">

    <h3>Confirmar acción</h3>
    <p id="confirmMensaje">¿Estás seguro?</p>

    <div class="confirm-actions">
      <button id="btnConfirmar" class="btn-confirmar">Aceptar</button>
      <button id="btnCancelar" class="btn-cancelar">Cancelar</button>
    </div>

  </div>
</div>

</div>
