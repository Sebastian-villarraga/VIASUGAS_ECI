<div id="rc-container">

  <div id="rc-layout">

    <!-- IZQUIERDA -->
    <div id="rc-left-card">

      <h2 id="rc-title">Registro de Conductor</h2>

      <div class="rc-field">
        <label>Cédula</label>
        <input type="text" id="rc-cedula">
      </div>

      <div class="rc-field">
        <label>Manifiesto</label>
        <select id="rc-manifiesto" disabled>
          <option value="">Seleccione</option>
        </select>
      </div>

      <!-- FORM -->
      <div id="rc-form" class="rc-hidden">

        <div class="rc-field">
          <label>Tipo de gasto</label>
          <select id="rc-tipo"></select>
        </div>

        <div class="rc-field">
          <label>Valor</label>
          <input type="number" id="rc-valor">
        </div>

        <div class="rc-field">
          <label>Fecha</label>
          <input type="date" id="rc-fecha">
        </div>

        <div class="rc-field">
          <label>Descripción</label>
          <textarea id="rc-descripcion"></textarea>
        </div>

        <button id="rc-guardar">Guardar</button>

      </div>

    </div>

    <!-- DERECHA -->
    <div id="rc-right-card">

      <h3>Gastos del manifiesto</h3>

      <table id="rc-tabla">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Valor</th>
            <th>Descripción</th>
          </tr>
        </thead>
        <tbody id="rc-body"></tbody>
      </table>

    </div>

  </div>

</div>
