<div id="rc-container">

  <div class="rcx-layout">

    <!-- IZQUIERDA -->
    <section class="rcx-left-card">

      <h2 id="rc-title">Registro de Conductor</h2>

      <div class="rcx-field">
        <label>Cédula</label>
        <input type="text" id="rc-cedula">
      </div>

      <div class="rcx-field">
        <label>Manifiesto</label>
        <select id="rc-manifiesto" disabled>
          <option value="">Seleccione</option>
        </select>
      </div>

      <!-- FORM -->
      <div id="rc-form" class="rc-hidden">

        <div class="rcx-field">
          <label>Tipo de gasto</label>
          <select id="rc-tipo"></select>
        </div>

        <div class="rcx-field">
          <label>Valor</label>
          <input type="number" id="rc-valor">
        </div>

        <div class="rcx-field">
          <label>Fecha</label>
          <input type="date" id="rc-fecha">
        </div>

        <div class="rcx-field">
          <label>Descripción</label>
          <textarea id="rc-descripcion"></textarea>
        </div>

        <button id="rc-guardar" class="rcx-btn rcx-btn-primary">
          Guardar
        </button>

      </div>

    </section>

    <!-- DERECHA -->
    <section class="rcx-right-card">

      <h3>Gastos del manifiesto</h3>

      <div class="rcx-table-scroll">

        <table id="rc-tabla" class="rcx-table">

          <thead>
            <tr>
              <th>Fecha</th>
              <th>Valor</th>
              <th>Descripción</th>
            </tr>
          </thead>

          <tbody id="rc-body"></tbody>

        </table>

      </div>

    </section>

  </div>

</div>
