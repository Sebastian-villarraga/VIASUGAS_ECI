<!-- dashboard-cartera.html COMPLETO -->

<div class="dcrt-layout">

  <!-- HEADER -->
  <div class="dcrt-header">
    <h2>Dashboard Cartera</h2>
  </div>

  <!-- FILTROS -->
  <div class="dcrt-filters-box">

    <!-- FILA 1 -->
    <div class="dcrt-toolbar">

      <button id="dcrtBtnMesAnterior" class="dcrt-btn dcrt-btn-light">
        Mes anterior
      </button>

      <button id="dcrtBtnMesActual" class="dcrt-btn dcrt-btn-primary">
        Este mes
      </button>

      <select id="dcrtFiltroAnio" class="dcrt-select"></select>

      <button id="dcrtBtnQ1" class="dcrt-btn dcrt-btn-light">1er Q</button>
      <button id="dcrtBtnQ2" class="dcrt-btn dcrt-btn-light">2do Q</button>
      <button id="dcrtBtnQ3" class="dcrt-btn dcrt-btn-light">3er Q</button>
      <button id="dcrtBtnQ4" class="dcrt-btn dcrt-btn-light">4to Q</button>

      <button id="dcrtBtnS1" class="dcrt-btn dcrt-btn-light">1er Sem</button>
      <button id="dcrtBtnS2" class="dcrt-btn dcrt-btn-light">2do Sem</button>

      <button id="dcrtBtnAnioCompleto" class="dcrt-btn dcrt-btn-light">
        Ańo completo
      </button>

    </div>

    <!-- FILA 2 -->
    <div class="dcrt-toolbar-bottom">

      <div class="dcrt-group">
        <label>Fecha desde</label>
        <input type="date" id="dcrtFechaDesde">
      </div>

      <div class="dcrt-group">
        <label>Fecha hasta</label>
        <input type="date" id="dcrtFechaHasta">
      </div>

      <div class="dcrt-group dcrt-btn-group">
        <label>&nbsp;</label>
        <button id="dcrtBtnLimpiar" class="dcrt-btn dcrt-btn-danger">
          Limpiar
        </button>
      </div>

    </div>

  </div>

  <!-- CARDS KPI -->
  <div id="dcrtCardsDashboard" class="dcrt-cards"></div>

  <!-- ===========================
       TABLAS FULL WIDTH
  ============================ -->
  <section class="dcrt-full-tables">

    <!-- FACTURAS VENCIDAS -->
    <div class="dcrt-table-card">
      <h3>Facturas Vencidas</h3>

      <div class="dcrt-table-scroll">
        <table class="dcrt-table">
          <thead>
            <tr>
              <th>Factura</th>
              <th>Cliente</th>
              <th>Empresa a Cargo</th>
              <th>Emisión</th>
              <th>Vence</th>
              <th>Días</th>
              <th>Pendiente</th>
            </tr>
          </thead>
          <tbody id="dcrTablaFacturasVencidas"></tbody>
        </table>
      </div>
    </div>

    <!-- DETALLE CARTERA -->
    <div class="dcrt-table-card">
      <h3>Detalle Cartera</h3>

      <div class="dcrt-table-scroll">
        <table class="dcrt-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Empresa a Cargo</th>
              <th>Factura</th>
              <th>Bruto</th>
              <th>Rte Fuente</th>
              <th>Rte ICA</th>
              <th>Neto</th>
              <th>Pagado</th>
              <th>Pendiente</th>
              <th>Vence</th>
              <th>Bucket</th>
            </tr>
          </thead>
          <tbody id="dcrTablaDetalle"></tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ===========================
       GRAFICAS ABAJO
  ============================ -->
  <section class="dcrt-bottom-charts">

    <!-- AGING -->
    <div class="dcrt-chart-card">
      <h3>Antigüedad de Cartera</h3>
      <div class="dcrt-chart-wrap">
        <canvas id="dcrGraficaAging"></canvas>
      </div>
    </div>

    <!-- TOP DEUDORES -->
    <div class="dcrt-chart-card">
      <h3>Top Deudores</h3>
      <div class="dcrt-chart-wrap">
        <canvas id="dcrGraficaTopDeudores"></canvas>
      </div>
    </div>

  </section>

</div>
