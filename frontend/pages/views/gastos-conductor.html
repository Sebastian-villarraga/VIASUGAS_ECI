<div class="gsx-layout">

  <section class="gsx-main">

    <!-- HEADER -->
    <div class="gsx-header">

      <h2>Gastos de Conductor</h2>

      <button
        id="btnNuevoGasto"
        class="gsx-btn gsx-btn-primary"
      >
        + Nuevo Gasto
      </button>

    </div>

    <!-- CARDS -->
    <div class="gsx-cards">

      <div class="gsx-card gsx-total">
        <h3>Total Gastos</h3>
        <p id="totalGastos">$0</p>
      </div>

      <div class="gsx-card gsx-cantidad">
        <h3>Cantidad</h3>
        <p id="totalCantidad">0</p>
      </div>

      <div class="gsx-card gsx-promedio">
        <h3>Promedio</h3>
        <p id="totalPromedio">$0</p>
      </div>

    </div>

    <!-- FILTROS -->
    <div class="gsx-filters-box">

      <div class="gsx-filters-grid">

        <button
          id="btnEsteMes"
          class="gsx-btn gsx-btn-light"
        >
          Ver este mes
        </button>

        <button
          id="btnMesAnterior"
          class="gsx-btn gsx-btn-light"
        >
          Ver mes anterior
        </button>

        <div class="gsx-field">
          <label>Desde</label>
          <input type="date" id="fDesde">
        </div>

        <div class="gsx-field">
          <label>Hasta</label>
          <input type="date" id="fHasta">
        </div>

        <div class="gsx-field">
          <label>Conductor</label>
          <select id="fConductor"></select>
        </div>

        <div class="gsx-field">
          <label>Manifiesto</label>
          <select id="fManifiesto"></select>
        </div>

        <div class="gsx-field">
          <label>Tipo de gasto</label>
          <select id="fTipo"></select>
        </div>

        <button
          id="btnLimpiar"
          class="gsx-btn gsx-btn-danger"
        >
          Limpiar
        </button>

      </div>

    </div>

    <!-- TABLA -->
    <div class="gsx-table-card">

      <div class="gsx-table-scroll">

        <table class="gsx-table">

          <thead>
            <tr>
              <th>Fecha</th>
              <th>Conductor</th>
              <th>Manifiesto</th>
              <th class="text-center">Valor</th>
              <th>Descripción</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaGastos"></tbody>

        </table>

      </div>

    </div>

  </section>

</div>

<!-- MODAL -->
<div id="modalGasto" class="gsx-modal hidden">

  <div class="gsx-modal-box">

    <div class="gsx-modal-header">
      <h3>Registrar Gasto</h3>
    </div>

    <div class="gsx-form-grid">

      <!-- MANIFIESTO -->
      <div class="gsx-field">
        <label for="id_manifiesto">Manifiesto</label>
        <select id="id_manifiesto">
          <option value="">Seleccione manifiesto</option>
        </select>
      </div>

      <div class="gsx-field">
        <label>Conductor</label>
        <input type="text" id="conductor_nombre" disabled>
      </div>

      <!-- TRANSACCION -->
      <div class="gsx-field">
        <label>Tipo de gasto *</label>
        <select id="tipo_transaccion"></select>
      </div>

      <div class="gsx-field">
        <label>Valor *</label>
        <input type="number" id="valor" placeholder="Valor">
      </div>

      <!-- FECHA -->
      <div class="gsx-field">
        <label for="fecha">Fecha *</label>
        <input type="date" id="fecha">
      </div>

      <!-- DESCRIPCION -->
      <div class="gsx-field gsx-full">
        <label for="descripcion">Descripción</label>
        <textarea
          id="descripcion"
          placeholder="Ej: Pago de peaje, tanqueo, etc."
        ></textarea>
      </div>

      <!-- BOTON -->
      <div class="gsx-modal-actions">
        <button
          type="button"
          id="guardarGasto"
          class="gsx-btn gsx-btn-primary"
        >
          Guardar
        </button>
      </div>

    </div>

  </div>

</div>
