<div class="gastos-layout">

  <!-- HEADER -->
  <div class="gastos-header">
    <h2>Gastos de Conductor</h2>

    <button id="btnNuevoGasto" class="btn-secundario">
      + Nuevo Gasto
    </button>
  </div>

  <!-- CARDS -->
  <div class="gastos-cards">
    <div class="card total">
      <h3>Total Gastos</h3>
      <p id="totalGastos">$0</p>
    </div>

    <div class="card cantidad">
      <h3>Cantidad</h3>
      <p id="totalCantidad">0</p>
    </div>

    <div class="card promedio">
      <h3>Promedio</h3>
      <p id="totalPromedio">$0</p>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="gastos-filtros">
    <button id="btnEsteMes" class="btn-secundario">Ver este mes</button>
    <button id="btnMesAnterior" class="btn-secundario">Ver mes anterior</button>
  
    <div class="filtro-group">
      <label>Desde</label>
      <input type="date" id="fDesde">
    </div>
  
    <div class="filtro-group">
      <label>Hasta</label>
      <input type="date" id="fHasta">
    </div>
  
    <div class="filtro-group">
      <label>Conductor</label>
      <select id="fConductor"></select>
    </div>
  
    <div class="filtro-group">
      <label>Manifiesto</label>
      <select id="fManifiesto"></select>
    </div>
  
    <div class="filtro-group">
      <label>Tipo de gasto</label>
      <select id="fTipo"></select>
    </div>
  
    <button id="btnLimpiar" class="btn-secundario">Limpiar</button>
  
  </div>

  <!-- TABLA -->
  <div class="gastos-tabla">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Conductor</th>
          <th>Manifiesto</th>
          <th class="text-center">Valor</th>
          <th>Descripción</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="tablaGastos">
        <!-- dinámico -->
      </tbody>
    </table>
  </div>

</div>

<!-- ========================= -->
<!-- MODAL -->
<!-- ========================= -->
<div id="modalGasto" class="modal hidden">

  <div class="modal-content">

    <!-- HEADER -->
    <div class="modal-header">
      <h3>Registrar Gasto</h3>
    </div>

    <!-- FORM GRID -->
    <div class="modal-form">



      <!-- MANIFIESTO -->
      <div class="form-group">
        <label for="id_manifiesto">Manifiesto</label>
        <select id="id_manifiesto">
          <option value="">Seleccione manifiesto</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Conductor</label>
        <input type="text" id="conductor_nombre" disabled>
      </div>

      <!-- TRANSACCION -->
      <div class="form-group">
        <label>Tipo de gasto *</label>
        <select id="tipo_transaccion"></select>
      </div>
      
      <div class="form-group">
        <label>Valor *</label>
        <input type="number" id="valor" placeholder="Valor">
      </div>

      <!-- FECHA -->
      <div class="form-group">
        <label for="fecha">Fecha *</label>
        <input type="date" id="fecha">
      </div>

      <!-- DESCRIPCION (FULL WIDTH) -->
      <div class="form-group full-width">
        <label for="descripcion">Descripción</label>
        <textarea 
          id="descripcion" 
          placeholder="Ej: Pago de peaje, tanqueo, etc."
        ></textarea>
      </div>

    </div>

    <!-- BOTONES -->
    <div class="modal-footer">
      <button type="button" id="guardarGasto" class="btn-principal full-width">
        Guardar
      </button>
    </div>

  </div>
</div>
