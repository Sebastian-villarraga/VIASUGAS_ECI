<div id="audit-container">

    </div>

    <div class="audit-filtros">

      <div class="audit-grupo">
        <label>Fecha desde</label>
        <input type="date" id="audit-fecha-desde">

      <div class="audit-grupo">
        <label>Fecha hasta</label>

      <button class="audit-btn-refresh" onclick="aplicarFiltroAudit()">
        Filtrar
      </button>

    </div>

    <div class="audit-table-wrapper">
      <table class="audit-table" id="tabla-audit">

        <thead>
          <tr>
            <th>Fecha</th>
            <th>Usuario</th>
            <th>Tabla</th>

            <th>Registro</th>
            <th>Cambios</th>
            <th>IP</th>
            <th>Detalle</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td colspan="8">Cargando auditorĂ­a...</td>
          </tr>
        </tbody>

      </table>
    </div>

  </section>

</div>

    <div class="audit-modal-header">
      <h3>Detalle de auditorĂ­a</h3>
      <button onclick="cerrarModalAudit()">×</button>

</div>
